name: master

on:
    workflow_dispatch:
        inputs:
            action_type:
                required: true
                default: 'deploy'
                type: choice
                options:
                  - deploy
                  - restart
#    push: #수동
#      branches:
#        - master

jobs:
    #소스 변동 사항이 있는지
    check:
        runs-on: ubuntu-latest
        outputs:
          mode: ${{ github.event.inputs.action_type }}
        steps:
          - name: Mode Selected
            run: echo "${{ github.event.inputs.action_type }}"
              
    build:
        needs: check
        if: needs.check.outputs.mode == 'deploy'
        runs-on: ubuntu-latest
        steps:
            #소스 코드 체크아웃
            - name: Checkout code
              uses: actions/checkout@v4
        
            #버전 셋팅
            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                java-version: '21'
                distribution: 'temurin'
                cache: gradle #Gradle 의존성 캐싱으로 빌드 속도 향상
        
            #Gradle 실행 권한 부여
            - name: Grant execute permission for gradlew
              run: chmod +x gradlew
        
            #프로젝트 빌드
            - name: Build with Gradle
              run: ./gradlew clean bootJar -x test
            
            #자르 생성
            - name: Upload Build 좌르
              uses: actions/upload-artifact@v4
              with:
                name: restApi-jar
                path: build/libs/restApi.jar
    
          
    deploy:
        needs: [check, build]
        if: needs.check.outputs.mode == 'deploy'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
              
            #빌드한 JAR 파일 다운로드
            - name: Download Build Jar
              uses: actions/download-artifact@v4
              with:
                name: restApi-jar
                path: build/libs/
                
            #헤로쿠 cli 설치
            - name: Install Heroku CLI
              run: curl https://cli-assets.heroku.com/install.sh | sh
            
            #Heroku 배포
            - name: Deploy to Heroku
              env:
                  HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
              run: |
                git config user.name "github-actions"
                git config user.email "github-actions@github.com"
                git commit --allow-empty -m "Force deploy: $(date)"
                heroku git:remote -a ${{ secrets.HEROKU_APP_NAME }}
                git push heroku master --force
            
    #변경사항 없으면 서버만 재시작    
    restart:
        needs: check
        if: needs.check.outputs.mode == 'restart'
        runs-on: ubuntu-latest
        steps:
            - name: Install Heroku CLI
              run: curl https://cli-assets.heroku.com/install.sh | sh
            - name: Restart Heroku Dynos
              run: heroku ps:restart -a ${{ secrets.HEROKU_APP_NAME }}
              env:
                  HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}