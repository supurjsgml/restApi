name: master

on:
    workflow_dispatch:
#    push: #수동
#      branches:
#        - master

jobs:
    #소스 변동 사항이 있는지
    check:
        runs-on: ubuntu-latest
        outputs:
            changed: ${{ steps.changed-files.outputs.changed }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 2
            - name: Check for changes
              id: changed-files
              run: | #디프디프가 있니 ?
                  if git diff --quiet HEAD^ HEAD -- \
                    src/main build.gradle; then
                    echo "changed=false" >> $GITHUB_OUTPUT
                  else
                    echo "changed=true" >> $GITHUB_OUTPUT
                  fi
              
    build:
        needs: check
        if: needs.check.outputs.changed == 'true'
        runs-on: ubuntu-latest
        
        steps:
            #소스 코드 체크아웃
            - name: Checkout code
              uses: actions/checkout@v4
        
            #버전 셋팅
            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                java-version: '21'
                distribution: 'temurin'
                cache: gradle #Gradle 의존성 캐싱으로 빌드 속도 향상
        
            #Gradle 실행 권한 부여
            - name: Grant execute permission for gradlew
              run: chmod +x gradlew
        
            #프로젝트 빌드
            - name: Build with Gradle
              run: ./gradlew clean bootJar -x test
            
            #자르 생성
            - name: Upload Build 좌르
              uses: actions/upload-artifact@v4
              with:
                name: restApi-jar
                path: build/libs/restApi.jar
                retention-days: 1 #으얼티 팩트 보관 7일
    
          
    deploy:
        needs: [check, build]
        if: needs.check.outputs.changed == 'true'
        runs-on: ubuntu-latest
        
        environment: redoc
        
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              
            #빌드한 JAR 파일 다운로드
            - name: Download Build Jar
              uses: actions/download-artifact@v4
              with:
                name: restApi-jar
                path: build/libs/
                
            # 헤로쿠 CLI 설치 (기존 스크립트 백업용 주석 처리)
            # - name: Install Heroku CLI
            #   run: curl https://cli-assets.heroku.com/install.sh | sh
            
            # Heroku 배포 (기존 스크립트 백업용 주석 처리)
            # - name: Deploy to Heroku
            #   uses: akhileshns/heroku-deploy@v3.13.15
            #   with:
            #     heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
            #     heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
            #     heroku_email: ${{ secrets.HEROKU_EMAIL }}
            #     usedocker: false
            #     healthcheck: "https://xn--v69a93jfng.xn--hk3b17f.xn--3e0b707e/api/getUrl"
            #     checkstring: ""
            #     # delay: 20
            #     rollbackonhealthcheckfailed: true

            # Lightsail로 JAR 파일 전송 (SCP)
            - name: Copy Jar to Lightsail
              uses: appleboy/scp-action@v0.1.7
              with:
                host: ${{ secrets.LIGHTSAIL_HOST }}
                username: ${{ secrets.LIGHTSAIL_USERNAME }}
                key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
                source: "build/libs/restApi.jar"
                target: "/home/ubuntu/rest-api"
                strip_components: 2 # build/libs/ 경로 구조 제거하고 파일만 전송

            # Lightsail 서버에서 PM2로 Java API 백그라운드 구동
            - name: SSH to Lightsail and deploy Java API
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.LIGHTSAIL_HOST }}
                username: ${{ secrets.LIGHTSAIL_USERNAME }}
                key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
                script: |
                  mkdir -p /home/ubuntu/rest-api
                  cd /home/ubuntu/rest-api
                  
                  # PM2를 이용하여 Java API를 prod 프로필로 실행 및 무중단 재시작
                  (REDIS_HOST="${{ secrets.REDIS_HOST }}" REDIS_PORT="${{ secrets.REDIS_PORT }}" REDIS_TOKEN="${{ secrets.REDIS_TOKEN }}" pm2 reload "rest-api" --update-env || REDIS_HOST="${{ secrets.REDIS_HOST }}" REDIS_PORT="${{ secrets.REDIS_PORT }}" REDIS_TOKEN="${{ secrets.REDIS_TOKEN }}" pm2 start "java -jar -Dspring.profiles.active=prod restApi.jar" --name "rest-api") && pm2 save
            
    #변경사항 없으면 서버만 재시작    
    restart:
        needs: check
        if: needs.check.outputs.changed == 'false'
        runs-on: ubuntu-latest
        steps:
            # 헤로쿠 재시작 (기존 스크립트 백업용 주석 처리)
            # - name: Install Heroku CLI
            #   run: curl https://cli-assets.heroku.com/install.sh | sh
            # - name: Restart Heroku Dynos
            #   run: heroku ps:restart -a ${{ secrets.HEROKU_APP_NAME }}
            #   env:
            #       HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}

            - name: SSH to Lightsail and restart PM2
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.LIGHTSAIL_HOST }}
                username: ${{ secrets.LIGHTSAIL_USERNAME }}
                key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
                script: |
                  pm2 restart "rest-api"