name: master

on:
    workflow_dispatch:
#    push: #수동
#      branches:
#        - master

jobs:
    #소스 변동 사항이 있는지
    check:
        runs-on: ubuntu-latest
        outputs:
            changed: ${{ steps.changed-files.outputs.changed }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
            - name: Check for changes
              id: changed-files
              run: | #디프디프가 있니 ?
                  if git diff --quiet HEAD^ HEAD -- src/main build.gradle; then
                    echo "changed=true" >> $GITHUB_OUTPUT
                  else
                    echo "changed=false" >> $GITHUB_OUTPUT
                  fi
              
    build:
        needs: check
        if: needs.check.outputs.changed == 'true'
        runs-on: ubuntu-latest
        
        steps:
            #소스 코드 체크아웃
            - name: Checkout code
              uses: actions/checkout@v4
        
            #버전 셋팅
            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                java-version: '21'
                distribution: 'temurin'
                cache: gradle #Gradle 의존성 캐싱으로 빌드 속도 향상
        
            #Gradle 실행 권한 부여
            - name: Grant execute permission for gradlew
              run: chmod +x gradlew
        
            #프로젝트 빌드
            - name: Build with Gradle
              run: ./gradlew clean bootJar -x test
            
            #자르 생성
            - name: Upload Build 좌르
              uses: actions/upload-artifact@v4
              with:
                name: restApi-jar
                path: build/libs/restApi.jar
    
          
    deploy:
        needs: [check, build]
        if: needs.check.outputs.changed == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              
            #빌드한 JAR 파일 다운로드
            - name: Download Build Jar
              uses: actions/download-artifact@v4
              with:
                name: restApi-jar
                path: build/libs/
                
            #헤로쿠 cli 설치
            - name: Install Heroku CLI
              run: curl https://cli-assets.heroku.com/install.sh | sh
            
            #Heroku 배포
            - name: Deploy to Heroku
              uses: akhileshns/heroku-deploy@v3.13.15
              with:
                heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
                heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
                heroku_email: ${{ secrets.HEROKU_EMAIL }}
                usedocker: false
                healthcheck: "https://xn--v69a93jfng.xn--hk3b17f.xn--3e0b707e/api/getUrl"
                checkstring: ""
                delay: 20
                rollbackonhealthcheckfailed: true
            
    #변경사항 없으면 서버만 재시작    
    restart:
        needs: check
        if: needs.check.outputs.changed == 'false'
        runs-on: ubuntu-latest
        steps:
            - name: Install Heroku CLI
              run: curl https://cli-assets.heroku.com/install.sh | sh
            - name: Restart Heroku Dynos
              run: heroku ps:restart -a ${{ secrets.HEROKU_APP_NAME }}
              env:
                  HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}