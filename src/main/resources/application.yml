spring:
  application:
    name: rest-api
  data:
    redis:
      host: ${REDIS_HOST:뭐게요~!}
      port: ${REDIS_PORT:9999}
      password: ${REDIS_TOKEN:낄낄}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:true}
  profiles:
    active:
    - local
  mvc:
    view:
      prefix: /WEB-INF/views/jsp/
      suffix: .jsp
#    static-path-pattern: /static/**
  thymeleaf:
    cache: false
    check-template-location: true
    prefix: classpath:/templates/
    suffix: .html
    view-names: html/*
  messages:
    basename: messages
  web:
    locale: ko
#    locale-resolver: fixed
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: guney-consumer
      client-id: api-server
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
  
key:
  kakao:
    clientId: 뭐게요
    clientSecret: 뭘까

server:
  port: ${port:8080}
  compression:
    enabled: true
    
springdoc:
  use-fqn: true
  swagger-ui:
    # swagger-ui 접근 경로. default 값은 /swagger-ui.html이다.
    path: /swagger-ui
   
    # 각 API의 그룹 표시 순서
    # path, query, body, response 순으로 출력
    groups-order: DESC
    
    # 태그 정렬 순서. 
    # alpha: 알파벳 순 정렬
    # method: OpenAPI specification file에 원하는 태그 정렬 방식 직접 기재
    tags-sorter: alpha
   
    # 컨트롤러 정렬 순서. 
    # method는 delete - get - patch - post - put 순으로 정렬된다.
    # alpha를 사용해 알파벳 순으로 정렬할 수 있다.
    operations-sorter: alpha
    
    # swagger-ui default url인 petstore html의 비활성화 설정
    disable-swagger-default-url: true
    
    # swagger-ui에서 try 했을 때 request duration을 알려주는 설정
    display-request-duration: true
    
  # openAPI 접근 경로. default 값은 /v3/api-docs 이다.
  api-docs:
    path: /v3/api-docs
    groups:
        enabled: true
    enabled: true
    
  # Spring Actuator의 endpoint까지 보여줄 것인지?  
  show-actuator: true
  
  # request media type 의 기본 값
  default-consumes-media-type: application/json
  
  # response media type 의 기본 값
  default-produces-media-type: application/json
  
  # 해당 패턴에 매칭되는 controller만 swagger-ui에 노출한다.
#  paths-to-match:
#    - /api/**


---

spring:
  config:
    activate:
      on-profile:
      - local

rest-api:
  batch:
    baseUrl: http://localhost:8081
  kakao:
    v2: /v2
    api:
      baseUrl: https://kapi.kakao.com
      memo: "${rest-api.kakao.api.baseUrl}${rest-api.kakao.v2}/api/talk/memo/default/send"
    auth:
      baseUrl: https://kauth.kakao.com
      token: ${rest-api.kakao.auth.baseUrl}/oauth/token


